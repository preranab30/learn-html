<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class = "parent">
        parent
        <div class ="child">child</div>

    </div>
    
</body>
<style>
    .parent{
        position: relative;
        width : 300px;
        height: 300px;
        background: skyblue;
        top: 200px;
        left: 150px;
    }
    .child{
        position: absolute;
        width:50px;
        height: 80px;
        background: pink;
        top: 200px;
        left: 50px;
        }
        @media (max-width: 768px) and (min-width: 200px) {
            .parent{
            width:500px;
            height: 500px;
            background: green;
        }
        }
   
    </style>
</html>
